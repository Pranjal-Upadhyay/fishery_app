name: CI/CD Quality and Security Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

# Repo layout (post npm-workspaces split):
#   backend/   — Express API (TypeScript)
#   mobile/    — Expo / React Native (TypeScript)
#   dashboard/ — Next.js 15 admin dashboard (TypeScript)
# Each subproject has its own package-lock.json and runs independently.

jobs:
  backend:
    name: Backend — install, audit, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security audit (critical only)
        run: npm audit --audit-level=critical
        # See SECURITY.md for the audit exceptions log on high/moderate items.

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --passWithNoTests --runInBand

  mobile:
    name: Mobile — install, audit, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        # --legacy-peer-deps required by some Expo SDK 54 peers (react-native-web-maps, etc.)

      - name: Security audit (critical only)
        run: npm audit --audit-level=critical
        # Known build-tooling exceptions: node-fetch@1.7.3, @babel/runtime, postcss, uuid.
        # See SECURITY.md.

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --passWithNoTests --runInBand

  dashboard:
    name: Dashboard — install, typecheck, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    env:
      # Build needs these to be present (even with placeholder values) so
      # Next.js can pre-render the static pages at build time. The real
      # values are injected at deploy time by Vercel.
      NEXT_PUBLIC_API_BASE_URL: https://fishery-app.onrender.com
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ci-build-placeholder
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (Next.js production)
        run: npm run build
