name: Keep Render Backend Alive

# ── Strategy ─────────────────────────────────────────────────────────────────
# GitHub Actions cron is unreliable (can be delayed 15–60 min on heavy load).
# Instead of relying on 4 staggered matrix jobs, we run ONE job that internally
# loops and pings every 3 minutes for the full 14-minute window.
# This guarantees at least 4 pings per invocation regardless of when GH fires it.
# Render free tier sleeps after 15 minutes idle → 3-min pings keep it always warm.

on:
  schedule:
    # Every 14 minutes — keeps overlap so no gap between invocations
    - cron: "*/14 * * * *"

  # Manual trigger from the Actions tab (for testing / emergency wake)
  workflow_dispatch:

jobs:
  keep-alive:
    name: Ping & Keep Warm
    runs-on: ubuntu-latest
    timeout-minutes: 14

    steps:
      - name: Warm backend with rolling pings every 3 minutes
        run: |
          URL="${{ secrets.RENDER_BACKEND_URL }}/health"
          MAX_DURATION=780   # 13 minutes total (leave 1 min buffer)
          INTERVAL=180       # ping every 3 minutes
          ELAPSED=0
          PING_COUNT=0

          echo "🌐 Target: $URL"
          echo "🔁 Will ping every ${INTERVAL}s for up to ${MAX_DURATION}s"
          echo ""

          while [ "$ELAPSED" -lt "$MAX_DURATION" ]; do
            PING_COUNT=$((PING_COUNT + 1))
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
            echo "──────────────────────────────────────────────────"
            echo "📡 Ping #${PING_COUNT} at ${TIMESTAMP} (${ELAPSED}s elapsed)"

            set +e
            HTTP_STATUS=$(curl \
              --silent \
              --output /dev/null \
              --write-out "%{http_code}" \
              --max-time 60 \
              --connect-timeout 30 \
              --retry 2 \
              --retry-delay 5 \
              --retry-all-errors \
              "$URL")
            CURL_EXIT=$?
            set -e

            if [ "$CURL_EXIT" -eq 0 ] && [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
              echo "✅ Backend alive — HTTP $HTTP_STATUS"
            elif [ "$CURL_EXIT" -eq 28 ]; then
              echo "⚠️  Timeout (60s) — backend may be cold-starting (this is normal on first ping)"
            elif [ "$CURL_EXIT" -ne 0 ]; then
              echo "❌ curl error (exit $CURL_EXIT) — possible network issue"
            else
              echo "⚠️  HTTP $HTTP_STATUS — unexpected response"
            fi

            # Sleep for the interval, but only if there's time left
            NEXT_ELAPSED=$((ELAPSED + INTERVAL))
            if [ "$NEXT_ELAPSED" -lt "$MAX_DURATION" ]; then
              echo "💤 Sleeping ${INTERVAL}s until next ping..."
              sleep $INTERVAL
            fi

            ELAPSED=$NEXT_ELAPSED
          done

          echo ""
          echo "──────────────────────────────────────────────────"
          echo "✅ Keep-alive session complete — ${PING_COUNT} pings sent."
